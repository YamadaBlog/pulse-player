name: Accessibility (Axe-core)

# Runs Axe-core a11y rules against the Vue v2.3.4 demo via Playwright.
# Catches WCAG 2.1 violations in the rendered chrome that the unit
# tests can't see — colour contrast, ARIA hierarchy, focus order,
# keyboard reachability.
#
# Stays informational (`continue-on-error: true`) — the strict-mode
# promotion attempted in v3.0.0-alpha.16 revealed two real failures
# that the continue-on-error flag had been masking since alpha.12:
#   1. `tests/visual/a11y.spec.ts:38` — selector `section.variants,
#      .variants` doesn't match the v2.3.4 demo's actual markup.
#   2. `tests/visual/a11y.spec.ts:23` — the home-page scan surfaced
#      WCAG 2.1 AA violations that need a triage pass before they
#      can be classified as fix-needed vs known-allowed.
# Both need a dedicated a11y sprint, not a one-flag flip. Reverted
# to informational mode so the gate still runs (output captured for
# inspection) without blocking unrelated merges. Re-promote to strict
# once the triage doc lands.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: Axe-core scan (Vue v2.3.4 demo)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Axe-core scan
        run: npm run test:a11y
        continue-on-error: true

      - name: Upload Axe-core report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: axe-report
          path: a11y-report/
          retention-days: 7
