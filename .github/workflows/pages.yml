name: Deploy demo to GitHub Pages

# Manual-only trigger.
#
# GitHub Pages on a PRIVATE repository requires a GitHub Pro / Team /
# Enterprise plan. This repo is on the Free plan, so the workflow fails
# with HTTP 422 on every run. Triggering on every push to main turned
# every push into a red CI status — pure noise. Switched to
# `workflow_dispatch` (manual button) so the workflow stays in the repo,
# ready to enable, but doesn't pollute the build history.
#
# Re-enable push trigger once ONE of these is decided:
#   1. Upgrade to GitHub Pro ($4/mo) — activates Pages on private repos
#   2. Make the repo public — Pages works on the Free plan
#   3. Migrate hosting to Cloudflare Pages / Netlify / Vercel (free tier;
#      the workflow gets retired in favour of their deploy hook)
#
# See docs/universal/BLOCKERS.md #0 for the decision matrix.

on:
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and the latest. Don't cancel the in-progress run
# — we want it to finish to leave a coherent deploy on the Pages CDN.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build demo
        run: npm run build
        env:
          # GitHub Pages serves the demo from
          # https://YamadaBlog.github.io/pulse-player/, so Vite needs
          # to know the base path for asset URLs.
          BASE_PATH: /pulse-player/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
