<!doctype html>

    <meta name="theme-color" content="#05050A" />

    <meta
      property="og:image"
      content="https://img.youtube.com/vi/q_FJ1GWaCc8/maxresdefault.jpg"

    <meta property="og:image:height" content="720" />
